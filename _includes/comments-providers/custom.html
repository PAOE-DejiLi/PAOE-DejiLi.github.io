{% if page.collection == 'posts' %}
<link
  rel="stylesheet"
  href="https://unpkg.com/@waline/client@v3/dist/waline.css"
/>

<div class="page__comments-custom">
  <div id="waline"></div>
</div>

<script type="module">
  import { init } from 'https://unpkg.com/@waline/client@v3/dist/waline.js';

  init({
    el: '#waline',
    serverURL: 'https://123-steel-phi-83.vercel.app',
    lang: 'zh-CN',
    meta: ['nick', 'mail', 'link'],
    requiredMeta: ['nick', 'mail'],
    pageview: true,
    comment: true,
  });
</script>

<style>
  .page__comments-custom {
    max-width: 760px;
    margin: 2rem auto 0 auto;
  }
</style>
{% endif %}

<!-- end custom comments snippet -->
